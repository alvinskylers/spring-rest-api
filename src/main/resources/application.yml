spring:
  application:
    name: task-manager

  # Datasource Configuration
  datasource:
    url: jdbc:h2:mem:taskdb
    driverClassName: org.h2.Driver
    username: username
    password: password

  # JPA Configuration

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  # H2 Configuration
  h2:
    console:
      enabled: true
      path: /h2-console

# App Information
app:
  name: Task Manager
  version: 1.0.0
  max-task-per-page: 20